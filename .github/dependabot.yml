version: 2

# Weekly dependency + security update PRs. A short cooldown mirrors the pnpm
# supply-chain policy (minimumReleaseAge) so brand-new releases aren't proposed
# before they've had time to be vetted.
updates:
  - package-ecosystem: npm
    directory: "/"
    # Open PRs against dev; promote to main via the normal dev -> main PR.
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5
    groups:
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: cargo
    directory: "/src-tauri"
    target-branch: dev
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    cooldown:
      default-days: 5

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
