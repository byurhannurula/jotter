name: CI

# Fast, cheap gates on every push/PR. The Rust suite is NOT run here: compiling the
# Tauri crate is slow (and 10x-billed on macOS), so it runs at release time across
# all three OSes in release.yml, and `pnpm release` also gates on `cargo test`
# locally before it tags. Develop on `dev`; `main` is release/deploy-ready.
on:
  push:
    branches: [main, dev]
  pull_request:

# On rapid pushes to the same branch/PR, cancel the superseded run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm build
