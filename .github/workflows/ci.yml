name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  js-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm test

  rust-tests:
    # macOS runner already has WebKit, so the tauri crate compiles without extra deps.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        working-directory: src-tauri
        run: cargo test
