name: Release

# Push a version tag to build installers for every OS and attach them
# to a (draft) GitHub Release:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # universal macOS (Apple Silicon + Intel)
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, so release notes can diff since the last tag

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: pnpm install

      # Gate the release on the full suite, on each OS. This is the only place the
      # Rust tests run in CI (per-commit CI skips them to stay cheap), so a tagged
      # release is where cross-platform regressions get caught.
      - name: Test (frontend + Rust)
        run: |
          pnpm test
          cargo test --manifest-path src-tauri/Cargo.toml

      # Build release notes automatically: commits since the previous tag + install footer.
      - name: Assemble release notes
        id: notes
        shell: bash
        run: |
          prev="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          if [ -n "$prev" ]; then range="$prev..${GITHUB_REF_NAME}"; else range=""; fi
          {
            echo "### What's changed"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' $range
            echo
            echo
            echo '---'
            echo 'These builds are **not code-signed / notarized** (no paid developer accounts):'
            echo '- **macOS** — Gatekeeper blocks the first launch. **System Settings → Privacy & Security → Open Anyway**, or run `xattr -dr com.apple.quarantine /Applications/Jotter.app`.'
            echo '- **Windows** — SmartScreen: **More info → Run anyway**.'
            echo '- **Linux** — AppImage: `chmod +x` then run; or install the `.deb`.'
          } > notes.md
          {
            echo "body<<RELEASE_EOF"
            cat notes.md
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Auto-update signing. Empty until the secrets are added; harmless while
          # bundle.createUpdaterArtifacts is off. To enable in-app updates: run
          # `pnpm tauri signer generate`, put the public key in tauri.conf.json
          # (plugins.updater.pubkey), add these two secrets, and set
          # bundle.createUpdaterArtifacts = true.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Jotter ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
