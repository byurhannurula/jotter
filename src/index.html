<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Untitled</title>
    <script type="module" src="/main.js" defer></script>
  </head>
  <body class="sidebar-hidden">
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <header class="sidebar-head" data-tauri-drag-region>
            <button id="new-draft" class="icon-btn" title="New draft (⌘N)" aria-label="New draft">
              <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
                <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
              </svg>
            </button>
          </header>
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 16 16" width="13" height="13" aria-hidden="true">
              <circle cx="7" cy="7" r="4.2" stroke="currentColor" stroke-width="1.4" fill="none"/>
              <path d="M10.2 10.2L13.5 13.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
            <input id="search" class="search" type="search" placeholder="Search drafts" spellcheck="false" autocomplete="off" />
          </div>
          <ul id="draft-list" class="draft-list"></ul>
        </div>
      </aside>

      <main class="content">
        <header class="tabbar" data-tauri-drag-region>
          <div id="tabs" class="tabs" data-tauri-drag-region></div>
          <button id="new-tab" class="icon-btn tab-new" title="New tab (⌘T)" aria-label="New tab">
            <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true">
              <path d="M8 3.5v9M3.5 8h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
            </svg>
          </button>
          <button id="preview-toggle" class="icon-btn" title="Markdown preview (⇧⌘P)" aria-label="Toggle markdown preview">
            <svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.4">
              <path d="M2 4.5A1.5 1.5 0 0 1 3.5 3H8v10H3.5A1.5 1.5 0 0 1 2 11.5v-7Z"/>
              <path d="M8 3h4.5A1.5 1.5 0 0 1 14 4.5v7a1.5 1.5 0 0 1-1.5 1.5H8" opacity="0.5"/>
            </svg>
          </button>
        </header>
        <div id="preview" class="md-view markdown-body" hidden></div>
        <div id="findbar" class="findbar" hidden>
          <div class="find-row">
            <input id="find-input" class="find-field" type="text" placeholder="Find" spellcheck="false" autocomplete="off" />
            <span id="find-count" class="find-count"></span>
            <button id="find-case" class="find-btn toggle" title="Match case">Aa</button>
            <button id="find-prev" class="find-btn" title="Previous (⇧⏎)" aria-label="Previous match">‹</button>
            <button id="find-next" class="find-btn" title="Next (⏎)" aria-label="Next match">›</button>
            <button id="find-replace-toggle" class="find-btn" title="Toggle replace" aria-label="Toggle replace">⇄</button>
            <button id="find-close" class="find-btn" title="Close (Esc)" aria-label="Close">×</button>
          </div>
          <div id="find-replace-row" class="find-row" hidden>
            <input id="replace-input" class="find-field" type="text" placeholder="Replace" spellcheck="false" autocomplete="off" />
            <button id="replace-one" class="find-btn text">Replace</button>
            <button id="replace-all" class="find-btn text">All</button>
          </div>
        </div>
        <textarea
          id="editor"
          class="editor"
          spellcheck="true"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          placeholder="Start writing…"
        ></textarea>
        <footer id="statusbar" class="statusbar">
          <span id="status-pos" class="status-seg"></span>
          <span id="status-count" class="status-seg"></span>
        </footer>
      </main>
    </div>

    <!-- Settings (rail + sections; About lives here too) -->
    <div id="settings" class="modal-backdrop" hidden>
      <div class="settings-window" role="dialog" aria-modal="true" aria-label="Settings">
        <nav class="settings-rail">
          <div class="rail-title">Settings</div>
          <button class="rail-item" data-section="general">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" aria-hidden="true"><path d="M2 5h6M11 5h3M2 11h3M8 11h6"/><circle cx="9.5" cy="5" r="1.6"/><circle cx="6.5" cy="11" r="1.6"/></svg>
            <span>General</span>
          </button>
          <button class="rail-item" data-section="editor">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" aria-hidden="true"><path d="M10.5 2.5l3 3L6 13l-3.5.5.5-3.5z"/></svg>
            <span>Editor</span>
          </button>
          <button class="rail-item" data-section="shortcuts">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" aria-hidden="true"><rect x="1.5" y="4" width="13" height="8" rx="1.5"/><path d="M4 7h0M6.5 7h0M9 7h0M11.5 7h0M5 9.5h6"/></svg>
            <span>Shortcuts</span>
          </button>
          <button class="rail-item" data-section="about">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><circle cx="8" cy="8" r="6"/><path d="M8 7.4v3.1" stroke-linecap="round"/><circle cx="8" cy="5.1" r="0.4" fill="currentColor" stroke="none"/></svg>
            <span>About</span>
          </button>
        </nav>
        <div class="settings-content">
          <button id="settings-close" class="modal-close" aria-label="Close">×</button>
          <div class="settings-section" data-section="general"></div>
          <div class="settings-section" data-section="editor"></div>
          <div class="settings-section" data-section="shortcuts"></div>
          <div class="settings-section" data-section="about"></div>
        </div>
      </div>
    </div>

    <!-- Quick switcher (⌘P) -->
    <div id="switcher" class="modal-backdrop switcher-backdrop" hidden>
      <div class="switcher" role="dialog" aria-modal="true" aria-label="Quick open">
        <input
          id="switcher-input"
          class="switcher-input"
          type="text"
          placeholder="Search drafts…"
          spellcheck="false"
          autocomplete="off"
        />
        <ul id="switcher-list" class="switcher-list"></ul>
      </div>
    </div>

    <!-- Rename / text prompt -->
    <div id="prompt" class="modal-backdrop" hidden>
      <div class="prompt-box" role="dialog" aria-modal="true" aria-labelledby="prompt-title">
        <div id="prompt-title" class="prompt-title">Rename</div>
        <input
          id="prompt-input"
          class="prompt-input"
          type="text"
          spellcheck="false"
          autocomplete="off"
        />
        <div class="prompt-actions">
          <button id="prompt-cancel" class="prompt-btn">Cancel</button>
          <button id="prompt-ok" class="prompt-btn primary">Save</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast-host" class="toast-host" aria-live="polite"></div>
  </body>
</html>
